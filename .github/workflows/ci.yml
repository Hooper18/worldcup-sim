name: CI

on:
  push:
    branches: [main]
    # 数据/赛果文件由 update.yml 自动提交，不触发 CI（避免无谓跑动）
    paths-ignore:
      - 'web/public/data/**'
      - 'engine/data/**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: 安装依赖
        run: uv sync
      - name: pytest
        run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: 单元测试
        run: npm run test
      - name: 类型检查 + 构建
        run: npm run build
