name: CI

on:
  push:
    branches: [main]
    # 数据/赛果文件由 update.yml 自动提交，不触发 CI（避免无谓跑动）
    paths-ignore:
      - 'web/public/data/**'
      - 'engine/data/**'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: 安装依赖
        run: uv sync
      - name: ruff lint
        run: uv run ruff check .
      - name: ruff format 检查
        run: uv run ruff format --check .
      - name: pytest
        run: uv run pytest -q --cov=wcsim --cov-report=term-missing

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier 检查
        run: npm run format:check
      - name: knip 死代码/未用依赖
        run: npm run knip
      - name: 单元测试
        run: npm run test
      - name: 类型检查 + 构建
        run: npm run build
      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run test:e2e
      - name: 上传 Playwright 报告（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
